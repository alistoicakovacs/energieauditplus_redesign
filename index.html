<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logos/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logos/favicon.png" />
    <!--
      Font preloads (deliberate minimum): the two faces on the critical
      paint path — Calibri 400 (brand body, self-hosted so it renders on
      every OS) + Space Grotesk 700 (display headings). Other weights (Calibri
      300/700, Carlito fallback, Space Grotesk 600) load on demand via @font-face.
    -->
    <link
      rel="preload"
      href="/fonts/calibri-latin-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/space-grotesk-latin-700-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- No static <title>: per-route <title>/<meta> render in <Seo> (React 19
         metadata hoisting); the prerender moves them into this <head>. -->
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
