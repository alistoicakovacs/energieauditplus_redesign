<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!--
      Font preloads (deliberate minimum): only the two files actually used
      cross-platform — Carlito 400 (body) + Caladea 700 (headings). On
      Windows the system fonts Calibri/Cambria win the CI-mandated stacks,
      so these preloads are unused there (a DevTools notice, ~50 KB); on
      every other OS they prevent FOUT on first paint. The 400-italic /
      700 / Caladea-400 files load on demand via @font-face.
    -->
    <link
      rel="preload"
      href="/fonts/carlito-latin-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/caladea-latin-700-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- No static <title>: per-route <title>/<meta> render in <Seo> (React 19
         metadata hoisting); the prerender moves them into this <head>. -->
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
